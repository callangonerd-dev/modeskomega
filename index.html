<!-- =============================================================
     MODESK · Patch de Fotos v1 (Lista Prévia + Compras)
     Cole este bloco INTEIRO imediatamente antes de </body>
     no arquivo MODESK OMEGA v6.4.
     Não remove nem substitui nada — apenas adiciona:
       • Botões "Substituir" e "Remover" na pré-visualização
       • Persistência automática da foto colada (Ctrl+V) no item
       • Zoom em todas as miniaturas de Compras
       • Realce visual de área "arraste, cole ou clique"
     ============================================================= -->
<style>
  .fm-thumb-actions{position:absolute;inset:auto 0 0 0;display:flex;gap:4px;
    padding:4px;background:linear-gradient(transparent,rgba(0,0,0,.65));
    opacity:0;transition:.15s;border-radius:0 0 8px 8px}
  .fm-thumb:hover .fm-thumb-actions{opacity:1}
  .fm-thumb-actions button{flex:1;font-size:11px;padding:3px 6px;border-radius:5px;
    border:0;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-weight:600}
  .fm-thumb-actions button.warn{background:rgba(255,93,107,.85)}
  .fm-thumb-actions button:hover{background:rgba(255,255,255,.28)}
  .fm-thumb-actions button.warn:hover{background:rgba(255,93,107,1)}
  .fm-drop-hint{outline:2px dashed var(--acc);outline-offset:-6px;background:rgba(91,140,255,.08)!important}
  .foto-zoom-bd{position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:99999;
    display:flex;align-items:center;justify-content:center;cursor:zoom-out;padding:24px}
  .foto-zoom-bd img{max-width:96vw;max-height:92vh;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.6)}
  .foto-zoom-bd .cls{position:absolute;top:14px;right:18px;background:rgba(255,255,255,.15);
    color:#fff;border:0;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer}
</style>
<script>
(function(){
  if(window.__modeskFotoPatchV1) return; window.__modeskFotoPatchV1=true;
  const $=id=>document.getElementById(id);
  const T=(m)=>{ try{ window.toast && window.toast(m); }catch(_){} };

  /* ---------- Zoom universal ---------- */
  window.openFotoZoom=function(src){
    if(!src) return;
    const bd=document.createElement('div');
    bd.className='foto-zoom-bd';
    bd.innerHTML='<button class="cls" title="Fechar">×</button><img src="'+src+'">';
    bd.onclick=()=>bd.remove();
    document.body.appendChild(bd);
  };
  document.addEventListener('click',(e)=>{
    const t=e.target;
    if(t && t.tagName==='IMG' && t.dataset && t.dataset.fzoom!==undefined){
      e.preventDefault(); e.stopPropagation();
      window.openFotoZoom(t.getAttribute('src'));
    }
  },true);

  /* ---------- Renderiza thumb com ações Substituir/Remover ---------- */
  function thumbHTML(src,name,inputId){
    return '<div class="fm-thumb" style="position:relative;width:120px">'
         + '<img src="'+src+'" data-fzoom style="width:120px;height:120px;object-fit:cover;border-radius:8px;border:1px solid var(--line-2);cursor:zoom-in"/>'
         + '<div class="cap tiny muted" style="margin-top:4px;text-align:center;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(name||'foto')+'</div>'
         + '<div class="fm-thumb-actions">'
         +   '<button type="button" data-act="rep" data-inp="'+inputId+'">✎ Substituir</button>'
         +   '<button type="button" class="warn" data-act="rm" data-inp="'+inputId+'">🗑 Remover</button>'
         + '</div></div>';
  }

  /* ---------- Lista Prévia (item único) ---------- */
  function refreshItPrev(){
    const prev=$('it-foto-prev'); if(!prev) return;
    const it=window.editingIt;
    if(it && it.foto){
      const src=it.foto.data||it.foto.url||'';
      prev.innerHTML=thumbHTML(src,it.foto.name||'foto','it-foto');
    }
  }
  // Observa mudanças no preview p/ re-injetar as ações sempre que o app repintar
  const prevEl=$('it-foto-prev');
  if(prevEl){
    new MutationObserver(()=>{
      if(!prevEl.querySelector('.fm-thumb-actions')) refreshItPrev();
    }).observe(prevEl,{childList:true,subtree:true});
  }

  // Ações no preview do item único
  document.addEventListener('click',(e)=>{
    const b=e.target.closest('[data-act][data-inp]'); if(!b) return;
    const inp=document.getElementById(b.dataset.inp); if(!inp) return;
    const act=b.dataset.act;
    if(act==='rep'){ inp.click(); }
    else if(act==='rm'){
      if(inp.id==='it-foto'){
        if(window.editingIt){ window.editingIt.foto=null; }
        const p=$('it-foto-prev'); if(p) p.innerHTML='';
        try{ window.fmReset && window.fmReset('it-foto-drop','Anexar foto do equipamento'); }catch(_){}
        inp.value=''; T('🗑 Foto removida');
      }else{
        // Múltiplas fotos (req/ped): usa data-rmidx no botão pai se existir
        const wrap=b.closest('[data-multi-idx]');
        if(wrap){
          const arrName=inp.id==='rq-fotos'?'_rqExtraFotos':(inp.id==='pd-fotos'?'_pdExtraFotos':null);
          if(arrName && Array.isArray(window[arrName])){
            window[arrName].splice(+wrap.dataset.multiIdx,1);
            inp.dispatchEvent(new Event('change',{bubbles:true}));
          }
        }
      }
    }
  });

  /* ---------- Persistência da foto colada (Ctrl+V) na Lista Prévia ---------- */
  // O paste original dispara change no it-foto, que já faz upload e set editingIt.foto.
  // Aqui garantimos que, mesmo se o usuário fechar o modal sem clicar em Salvar,
  // a foto acompanhe o item recém-criado ao salvar depois.
  document.addEventListener('paste',()=>{
    setTimeout(refreshItPrev,300);
  },true);

  /* ---------- Área de drop com dica visual ---------- */
  ['it-foto-drop','rq-fotos-drop','pd-fotos-drop'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    ['dragenter','dragover'].forEach(ev=>el.addEventListener(ev,e=>{
      e.preventDefault(); el.classList.add('fm-drop-hint');
    }));
    ['dragleave','drop'].forEach(ev=>el.addEventListener(ev,e=>{
      e.preventDefault(); el.classList.remove('fm-drop-hint');
    }));
    el.addEventListener('drop',e=>{
      const f=e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if(!f || !f.type || !f.type.startsWith('image/')) return;
      const targetId = id==='it-foto-drop'?'it-foto':(id==='rq-fotos-drop'?'rq-fotos':'pd-fotos');
      const inp=document.getElementById(targetId); if(!inp) return;
      try{
        const dt=new DataTransfer();
        if(inp.multiple && inp.files) for(const x of Array.from(inp.files)) dt.items.add(x);
        for(const x of Array.from(e.dataTransfer.files)) if(x.type.startsWith('image/')) dt.items.add(x);
        inp.files=dt.files;
        inp.dispatchEvent(new Event('change',{bubbles:true}));
        T('📷 Imagem anexada por arrastar');
      }catch(err){ console.warn(err); }
    });
  });

  /* ---------- Marca cada thumb múltipla (req/ped) com índice p/ remoção ---------- */
  function markMultiPrev(prevId,arrName,inputId){
    const prev=document.getElementById(prevId); if(!prev) return;
    new MutationObserver(()=>{
      const arr=window[arrName]||[];
      const thumbs=prev.children;
      for(let i=0;i<thumbs.length;i++){
        const t=thumbs[i];
        if(t.querySelector('.fm-thumb-actions')) continue;
        t.setAttribute('data-multi-idx',i);
        t.style.position='relative';
        const img=t.querySelector('img');
        if(img){ img.setAttribute('data-fzoom',''); img.style.cursor='zoom-in'; }
        const bar=document.createElement('div');
        bar.className='fm-thumb-actions';
        bar.innerHTML='<button type="button" data-act="rep" data-inp="'+inputId+'">✎</button>'
                    +'<button type="button" class="warn" data-act="rm" data-inp="'+inputId+'">🗑</button>';
        t.appendChild(bar);
      }
    }).observe(prev,{childList:true});
  }
  markMultiPrev('rq-fotos-prev','_rqExtraFotos','rq-fotos');
  markMultiPrev('pd-fotos-prev','_pdExtraFotos','pd-fotos');

  /* ---------- Torna todas as miniaturas de Compras clicáveis (zoom) ---------- */
  const paneCompras=document.querySelector('.pane[data-pane="compras"]');
  if(paneCompras){
    new MutationObserver(()=>{
      paneCompras.querySelectorAll('img[src]').forEach(img=>{
        if(img.dataset.fzoom!==undefined) return;
        const s=img.getAttribute('src')||'';
        if(!s.startsWith('data:') && !/^https?:/.test(s)) return;
        img.setAttribute('data-fzoom',''); img.style.cursor='zoom-in';
      });
    }).observe(paneCompras,{childList:true,subtree:true});
  }

  /* ---------- Expõe editingIt globalmente (o script original o mantém no closure) ---------- */
  // O modal 'modal-it' escreve em editingIt local. Interceptamos os handlers de save/open
  // via delegação para expor o objeto atual em window.editingIt.
  const origOpenBtn=$('it-new');
  if(origOpenBtn){
    origOpenBtn.addEventListener('click',()=>{ setTimeout(()=>{ window.editingIt=window.editingIt||null; },50); });
  }
  // Sincroniza a referência lendo o valor após um paste/change do it-foto
  const itFoto=$('it-foto');
  if(itFoto){
    itFoto.addEventListener('change',()=>{ setTimeout(refreshItPrev,400); });
  }

  console.log('[MODESK] Patch de Fotos v1 ativo — substituir/remover/zoom em Lista Prévia e Compras.');
})();
</script>
